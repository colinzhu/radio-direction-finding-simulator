<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>80米无线电测向模拟器 | 科普与实践平台</title>
    <meta name="description" content="专为小学生设计的80米无线电测向（ARDF）模拟游戏，直观体验哑点线找台与交叉定位法。">
    <!-- 引入 Google Fonts 提升视觉品质 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Outfit:wght@300;400;600;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 头部标题栏 -->
        <header class="app-header">
            <div class="header-logo">
                <span class="logo-icon">📡</span>
                <div class="logo-text">
                    <h1>80米无线电测向模拟器</h1>
                    <p>ARDF 2D 科学模拟与交叉法教学系统</p>
                </div>
            </div>
            <div class="header-status">
                <div class="status-item">
                    <span class="status-dot green"></span>
                    <span class="status-label">接收机状态: </span>
                    <span id="rx-status-text" class="status-val text-neon-green">待机</span>
                </div>
            </div>
        </header>

        <!-- 主面板布局 -->
        <main class="main-dashboard">
            <!-- 左侧：测向接收机控制面板 -->
            <section class="control-panel panel-glass">
                <div class="panel-section-title">
                    <h3>📟 PJ-80 型测向接收机</h3>
                </div>

                <!-- S分贝表 (信号强度指示器) -->
                <div class="s-meter-container">
                    <div class="s-meter-gauge">
                        <div class="gauge-scale">
                            <span class="scale-mark" style="transform: rotate(-60deg)">1</span>
                            <span class="scale-mark" style="transform: rotate(-40deg)">3</span>
                            <span class="scale-mark" style="transform: rotate(-20deg)">5</span>
                            <span class="scale-mark" style="transform: rotate(0deg)">7</span>
                            <span class="scale-mark" style="transform: rotate(20deg)">9</span>
                            <span class="scale-mark text-danger" style="transform: rotate(40deg)">+20</span>
                            <span class="scale-mark text-danger" style="transform: rotate(60deg)">+40</span>
                        </div>
                        <div class="gauge-label-dbm">S-METER</div>
                        <div id="s-meter-needle" class="gauge-needle"></div>
                        <div class="gauge-center"></div>
                    </div>
                    <div class="s-meter-digital">
                        <div class="digital-display" id="s-value-display">S0 (0 dBm)</div>
                        <div class="digital-label">信号强度</div>
                    </div>
                </div>

                <!-- 接收机度盘/参数读取 -->
                <div class="telemetry-grid">
                    <div class="tel-item">
                        <div class="tel-label">电台代号</div>
                        <div class="tel-val" id="fox-id-display">--</div>
                    </div>
                    <div class="tel-item">
                        <div class="tel-label">莫尔斯码</div>
                        <div class="tel-val text-neon-orange" id="morse-code-display">--</div>
                    </div>
                    <div class="tel-item">
                        <div class="tel-label">当前朝向</div>
                        <div class="tel-val" id="compass-display">0° (北)</div>
                    </div>
                    <div class="tel-item">
                        <div class="tel-label">哑点线数量</div>
                        <div class="tel-val" id="null-line-count">0</div>
                    </div>
                </div>

                <!-- 旋钮与开关控制区 -->
                <div class="knob-row">
                    <!-- 电源开关/音频解锁 -->
                    <div class="control-knob-wrapper">
                        <label class="knob-label">电源开关</label>
                        <button id="power-btn" class="power-switch-btn off">
                            <span class="switch-indicator"></span>
                            <span class="switch-text">OFF</span>
                        </button>
                    </div>

                    <!-- 音量旋钮 -->
                    <div class="control-knob-wrapper">
                        <label class="knob-label">音量增益</label>
                        <div class="knob-container" id="volume-knob-container">
                            <div id="volume-knob" class="rotatable-knob" style="transform: rotate(0deg);">
                                <div class="knob-dot"></div>
                            </div>
                        </div>
                        <div class="knob-value" id="volume-value-display">50%</div>
                    </div>
                </div>

                <!-- 测向辅助操作区 -->
                <div class="action-buttons">
                    <button id="mark-null-btn" class="btn btn-primary" title="在左右侧信号完全消失(哑点)时，点击标记一条哑点线">
                        📍 标记当前哑点线 (L)
                    </button>
                    <button id="clear-null-btn" class="btn btn-secondary" title="清除所有已标记的哑点线重新开始">
                        🗑️ 清除哑点线 (C)
                    </button>
                </div>

                <!-- 调试与管理选项 -->
                <div class="debug-controls">
                    <div class="debug-title">🛠️ 科学教学/调试选项</div>
                    <div class="debug-row">
                        <label class="checkbox-container">
                            <input type="checkbox" id="show-fox-checkbox">
                            <span class="checkmark"></span>
                            显示隐藏电台位置
                        </label>
                        <button id="reset-game-btn" class="btn btn-sm btn-danger">
                            🔄 重置并随机放台
                        </button>
                    </div>
                    <div id="debug-info-panel" class="debug-info hidden">
                        <p>电台坐标: (<span id="debug-fox-x">0</span>, <span id="debug-fox-y">0</span>)</p>
                        <p>玩家坐标: (<span id="debug-player-x">0</span>, <span id="debug-player-y">0</span>)</p>
                        <p>直线距离: <span id="debug-distance">0</span> 米</p>
                        <p>相对夹角: <span id="debug-relative-angle">0</span>°</p>
                    </div>
                </div>
            </section>

            <!-- 右侧：地图与导航区域 -->
            <section class="map-panel panel-glass">
                <div class="panel-section-title flex-between">
                    <h3>🗺️ 测向训练地图 (2D 科学模拟公园)</h3>
                    <div class="map-controls">
                        <span class="kbd-tip">按键移动: ⬅️ ➡️ 转身 | ⬆️ ⬇️ 前进后退</span>
                    </div>
                </div>

                <!-- 地图 Canvas 容器 -->
                <div class="canvas-wrapper">
                    <canvas id="game-canvas" width="750" height="750"></canvas>
                    
                    <!-- 游戏通关浮层 -->
                    <div id="victory-overlay" class="overlay hidden">
                        <div class="overlay-content">
                            <span class="victory-icon">🏆</span>
                            <h2>恭喜你！成功找到电台！</h2>
                            <p id="victory-details">你共使用了 0 条哑点线，移动了 0 米。</p>
                            <div class="victory-buttons">
                                <button id="next-game-btn" class="btn btn-primary">再来一局</button>
                                <button id="close-victory-btn" class="btn btn-primary">关闭</button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

    </div>

    <!-- 导入 ES6 模块 -->
    <script type="module" src="src/js/app.js"></script>
</body>
</html>
